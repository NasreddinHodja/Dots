# Hyprland Configuration
# https://wiki.hypr.land/Configuring/

# ==================
# MONITOR CONFIG
# ==================
# Monitors from existing configuration
# monitor=,preferred,auto,auto
$mainMonitor = DP-3
$secondMonitor = HDMI-A-1

monitor = , preferred,auto,auto

# ==================
# STARTUP APPS
# ==================
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user start hyprland-session.target
exec-once = hyprctl dispatch focusmonitor DP-3

# ==================
# INPUT CONFIG
# ==================
input {
    kb_layout = us
    kb_variant = intl
    numlock_by_default = true
}

# ==================
# GENERAL LAYOUT
# ==================
general {
    gaps_in = 5
    gaps_out = 5
    border_size = 2

    layout = dwindle
}

# ==================
# DECORATION
# ==================
decoration {
    rounding = 12

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 10
        render_power = 5
        offset = 0 0
        color = rgba(00000070)
    }
}

# ==================
# ANIMATIONS
# ==================
animations {
    enabled = true

    animation = windowsIn, 1, 1, default
    animation = windowsOut, 1, 1, default
    animation = workspaces, 1, 2, default
    animation = windowsMove, 1, 2, default
    animation = fade, 1, 3, default
    animation = border, 1, 3, default
}

# ==================
# LAYOUTS
# ==================
dwindle {
    preserve_split = true
}

master {
    mfact = 0.5
}

scrolling {
    fullscreen_on_one_column = true
    column_width = 0.9
    direction = right
}

# ==================
# MISC
# ==================
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# ==================
# WINDOW RULES
# ==================
windowrule = tile on, match:class ^(org\.wezfurlong\.wezterm)$

windowrule = rounding 12, match:class ^(org\.gnome\.)

windowrule = tile on, match:class ^(gnome-control-center)$
windowrule = tile on, match:class ^(pavucontrol)$
windowrule = tile on, match:class ^(nm-connection-editor)$

windowrule = float on, match:class ^(gnome-calculator)$
windowrule = float on, match:class ^(galculator)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(org\.gnome\.Nautilus)$
windowrule = float on, match:class ^(xdg-desktop-portal)$

windowrule = no_initial_focus on, match:class ^(steam)$, match:title ^(notificationtoasts)
windowrule = pin on, match:class ^(steam)$, match:title ^(notificationtoasts)

windowrule = float on, match:class ^(firefox)$, match:title ^(Picture-in-Picture)$
windowrule = float on, match:class ^(zoom)$

# DMS windows floating by default
# ! Hyprland doesn't size these windows correctly so disabling by default here
# windowrule = float on, match:class ^(org.quickshell)$

layerrule = no_anim on, match:namespace ^(quickshell)$
layerrule = no_anim on, match:namespace ^dms:.*

source = ./dms/colors.conf
source = ./dms/border-patch.conf
source = ./dms/outputs.conf
source = ./dms/layout.conf
source = ./dms/cursor.conf
source = ./dms/binds.conf

## overrides

# Flameshot multi-monitor fix
windowrule = no_anim on, match:class ^(flameshot)$
windowrule = float on, match:class ^(flameshot)$
windowrule = move 0 0, match:class ^(flameshot)$
windowrule = pin on, match:class ^(flameshot)$
windowrule = fullscreen_state 0 2, match:class ^(flameshot)$

general {
    gaps_in = 5
    gaps_out = 10
}

workspace = 1, monitor:$mainMonitor
workspace = 2, monitor:$mainMonitor
workspace = 3, monitor:$mainMonitor
workspace = 4, monitor:$mainMonitor
workspace = 5, monitor:$mainMonitor
workspace = 6, monitor:$mainMonitor
workspace = 7, monitor:$secondMonitor
workspace = 8, monitor:$secondMonitor

execr-once = ~/.config/hypr/autostart.sh

cursor {
    default_monitor = $mainMonitor
}

monitor = $mainMonitor, preferred, 1920x0, 1
monitor = $secondMonitor, preferred, 0x0, 1

bind = SUPER, period, layoutmsg, move +col
bind = SUPER, comma, layoutmsg, move -col
bind = SUPER SHIFT, period, layoutmsg, swapcol r
bind = SUPER SHIFT, comma, layoutmsg, swapcol l

# Main GIMP canvas — keep tiling
windowrule = tile on, match:class ^(gimp)$, match:title (– GIMP)$

# Tool dialogs — float
windowrule = float on, match:class ^(gimp)$, match:title ^(?!.*– GIMP)
windowrule = float on, match:class ^(script-fu)$

# qbittorent float
windowrule = float on, match:class ^(org.qbittorrent.qBittorrent)$
windowrule = tile on, match:class ^(org.qbittorrent.qBittorrent)$, match:title ^(qBittorrent v.*)
