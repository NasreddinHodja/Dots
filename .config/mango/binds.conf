# key name refer to `xev` or `wev` command output
# mod keys: super, ctrl, alt, shift, none

# reload config
bind=SUPER+SHIFT,r,reload_config

# launcher
bind=SUPER,t,spawn,rofi -show drun

# terminal
bind=SUPER,Return,spawn,kitty

# lock screen
bind=SUPER+ALT,l,spawn,swaylock -f

# wallpaper picker
bind=SUPER+SHIFT,w,spawn,/home/nasreddin/.local/bin/pickbg

# screenshots
bind=NONE,Print,spawn,sh -c "grim -g \"$(slurp)\" - | satty -f -"
bind=SUPER,p,spawn,sh -c "grim -g \"$(slurp)\" - | satty -f -"
bind=SUPER+SHIFT,p,spawn,sh -c "grim - | satty -f -"

# notifications
bind=SUPER,c,spawn,dunstctl close-all

# restart waybar
bind=SUPER+SHIFT,b,spawn,sh -c "pkill waybar; /home/nasreddin/Prog/Waybar/build/waybar &"

# window control
bind=SUPER,q,killclient,
bind=SUPER,f,togglefullscreen,
bind=SUPER+SHIFT,f,togglefakefullscreen,
bind=SUPER+SHIFT,t,togglefloating,
bind=SUPER,r,switch_layout
bind=SUPER+CTRL,f,togglemaximizescreen,
bind=SUPER,g,toggleglobal,
bind=SUPER,i,minimized,
bind=SUPER+SHIFT,i,restore_minimized
bind=SUPER,o,toggleoverlay,
# bind=ALT,z,toggle_scratchpad

# focus (hjkl + arrows)
bind=SUPER,Tab,focusstack,next
bind=SUPER,h,focusdir,left
bind=SUPER,j,focusdir,down
bind=SUPER,k,focusdir,up
bind=SUPER,l,focusdir,right
bind=SUPER,Left,focusdir,left
bind=SUPER,Down,focusdir,down
bind=SUPER,Up,focusdir,up
bind=SUPER,Right,focusdir,right

# move windows
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,l,exchange_client,right
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Right,exchange_client,right

# move floating windows with keyboard
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0

# resize
bind=SUPER,equal,resizewin,+50,+0
bind=SUPER,minus,resizewin,-50,+0
bind=SUPER+SHIFT,equal,resizewin,+0,+50
bind=SUPER+SHIFT,minus,resizewin,+0,-50

# gaps
bind=ALT+SHIFT,x,incgaps,1
bind=ALT+SHIFT,z,incgaps,-1
bind=ALT+SHIFT,r,togglegaps

# monitor focus
bind=SUPER,comma,focusmon,left
bind=SUPER,period,focusmon,right
bind=SUPER+CTRL,Left,focusmon,left
bind=SUPER+CTRL,Right,focusmon,right

# move window to monitor
bind=SUPER+SHIFT,period,tagmon,left
bind=SUPER+SHIFT,comma,tagmon,right
bind=SUPER+CTRL+SHIFT,Left,tagmon,left
bind=SUPER+CTRL+SHIFT,Right,tagmon,right

# tag switching
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0
bind=SUPER,Page_Up,viewtoleft,0
bind=SUPER,Page_Down,viewtoright,0

# move window to tag
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0
bind=SUPER+CTRL,Up,tagtoleft,0
bind=SUPER+CTRL,Down,tagtoright,0
bind=SUPER+SHIFT,Page_Up,tagtoleft,0
bind=SUPER+SHIFT,Page_Down,tagtoright,0

# audio
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 3%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 3%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=NONE,XF86AudioMicMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# media
bind=NONE,XF86AudioPlay,spawn,playerctl play-pause
bind=NONE,XF86AudioPause,spawn,playerctl play-pause
bind=NONE,XF86AudioNext,spawn,playerctl next
bind=NONE,XF86AudioPrev,spawn,playerctl previous
bind=CTRL,XF86AudioRaiseVolume,spawn,playerctl volume 0.03+
bind=CTRL,XF86AudioLowerVolume,spawn,playerctl volume 0.03-

# brightness
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl set 5%+
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl set 5%-

# mouse
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize

# scroll to switch tags
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

bind=SUPER+SHIFT,x,spawn,/home/nasreddin/.local/bin/power-menu
