# keybindings
source=~/.config/mango/binds.conf
# colors
source=~/.config/mango/colors.conf

# autostart
exec-once=dbus-update-activation-environment --systemd --all
# exec-once=/home/nasreddin/.config/mango/autostart.sh
exec-once=~/Prog/Waybar/build/waybar
exec-once=dunst
# exec-once=swaync
exec-once=awww-daemon
exec-once=~/.local/bin/main-emacsclient
exec-once=flameshot
exec-once=blueman-applet

# keyboard
repeat_rate=25
repeat_delay=600
numlockon=1
xkb_rules_layout=us
xkb_rules_variant=intl

# trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# appearance
border_radius=0
borderpx=2
no_border_when_single=0
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

# colors are in colors.conf

# shadows
shadows=1
layer_shadows=1
shadow_only_floating=1
shadows_size=10
shadows_blur=22
shadows_position_x=0
shadows_position_y=6
# shadowscolor is in colors.conf

# blur
blur=0
blur_layer=0
blur_optimized=1
blur_params_num_passes=2
blur_params_radius=5
blur_params_noise=0.02
blur_params_brightness=0.9
blur_params_contrast=0.9
blur_params_saturation=1.2

# gaps
gappih=6
gappiv=6
gappoh=10
gappov=10
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9

# animation configuration (support type: zoom, slide)
# tag_animation_direction: 1-horizontal, 0-vertical
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.4
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=300
animation_duration_open=250
animation_duration_tag=280
animation_duration_close=200
animation_duration_focus=0
animation_curve_open=0.05,0.7,0.1,1
animation_curve_move=0.2,0,0,1
animation_curve_tag=0.2,0,0,1
animation_curve_close=0.3,0,0.8,0.15
animation_curve_focus=0.2,0,0,1
animation_curve_opafadeout=0.3,0,0.8,0.15
animation_curve_opafadein=0.05,0.7,0.1,1

# layouts
circle_layout=right_tile,monocle,scroller

# scroller layout setting
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=1
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# master-stack layout setting
new_is_master=0
default_mfact=0.5
default_nmaster=1
smartgaps=0

# overview setting
hotarea_size=10
enable_hotarea=0
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# misc
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=1
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1
cursor_hide_timeout=1

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# monitor rules
monitorrule=name:DP-3,width:1920,height:1080,refresh:100,x:1920,y:0,scale:1,rr:0,vrr:0
monitorrule=name:HDMI-A-1,width:1920,height:1080,refresh:75,x:0,y:0,scale:1,rr:0,vrr:0

# window rules
windowrule=isfloating:1,appid:^org\.gnome\.Nautilus$
windowrule=isfloating:1,appid:^org\.gnome\.Calculator$
windowrule=isfloating:1,appid:^galculator$
windowrule=isfloating:1,appid:^blueman-manager$
windowrule=isfloating:1,appid:^zoom$
windowrule=isfloating:1,appid:^org\.qbittorrent\.qBittorrent$
windowrule=isfloating:1,appid:^pavucontrol$

windowrule= isnoborder:1,isnoshadow:1,appid:^swaync

# flameshot multi-monitor
windowrule=isfloating:1,isnoborder:1,isnoshadow:1,isnoanimation:1,isglobal:1,appid:^flameshot

# gimp — float dialogs, tile main canvas
windowrule=isfloating:1,appid:^gimp$
windowrule=isfloating:0,appid:^gimp$,title:– GIMP$

# layer rules
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi

