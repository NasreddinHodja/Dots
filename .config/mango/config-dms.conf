# ── Environment ──────────────────────────────────────────────────────────────
env=QT_QPA_PLATFORM,wayland
env=ELECTRON_OZONE_PLATFORM_HINT,auto
env=QT_QPA_PLATFORMTHEME,gtk3

# ── Autostart ────────────────────────────────────────────────────────────────
# Start the graphical session target so DMS and other systemd services can launch
exec-once=dbus-update-activation-environment --systemd --all
exec-once=systemctl --user start mango-session.target
# DMS starts via systemd once graphical-session.target is up — do NOT add dms run here
exec-once=/home/nasreddin/.local/bin/main-emacsclient
exec-once=flameshot

# ── Keyboard ─────────────────────────────────────────────────────────────────
repeat_rate=25
repeat_delay=600
numlockon=1
xkb_rules_layout=us
xkb_rules_variant=intl

# ── Trackpad ─────────────────────────────────────────────────────────────────
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# ── Mouse ─────────────────────────────────────────────────────────────────────
mouse_natural_scrolling=0

# ── Appearance ────────────────────────────────────────────────────────────────
border_radius=12
borderpx=0
no_border_when_single=0
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

# ── Shadows ───────────────────────────────────────────────────────────────────
shadows=1
layer_shadows=0
shadow_only_floating=1
shadows_size=10
shadows_blur=15
shadows_position_x=0
shadows_position_y=0
shadowscolor=0x000000ff

# ── Blur ──────────────────────────────────────────────────────────────────────
blur=0
blur_layer=0
blur_optimized=1
blur_params_num_passes=2
blur_params_radius=5
blur_params_noise=0.02
blur_params_brightness=0.9
blur_params_contrast=0.9
blur_params_saturation=1.2

# ── Gaps ──────────────────────────────────────────────────────────────────────
gappih=5
gappiv=5
gappoh=5
gappov=5

# ── Animations ────────────────────────────────────────────────────────────────
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.4
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=800
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# ── Scroller layout ───────────────────────────────────────────────────────────
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# ── Master-Stack layout ───────────────────────────────────────────────────────
new_is_master=1
default_mfact=0.5
default_nmaster=1
smartgaps=0

# ── Overview ──────────────────────────────────────────────────────────────────
hotarea_size=10
enable_hotarea=1
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# ── Misc ──────────────────────────────────────────────────────────────────────
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9

# ── Per-tag layouts ───────────────────────────────────────────────────────────
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# ── Window rules ─────────────────────────────────────────────────────────────
# DMS shell window — no border, float
windowrule=isfloating:1,appid:^org\.quickshell$

# No border on common terminals/apps (DMS draws its own)
# windowrule=isnoborder:1,appid:^com\.mitchellh\.ghostty$
# windowrule=isnoborder:1,appid:^kitty$
# windowrule=isnoborder:1,appid:^org\.wezfurlong\.wezterm$
# windowrule=isnoborder:1,appid:^org\.gnome\.

# Float
windowrule=isfloating:1,appid:^org\.gnome\.Nautilus$
windowrule=isfloating:1,appid:^org\.gnome\.Calculator$
windowrule=isfloating:1,appid:^galculator$
windowrule=isfloating:1,appid:^blueman-manager$
windowrule=isfloating:1,appid:^zoom$
windowrule=isfloating:1,appid:^org\.qbittorrent\.qBittorrent$

# Flameshot multi-monitor
windowrule=isfloating:1,isnoanimation:1,isglobal:1,offsetx:0,offsety:0,appid:^flameshot$

# ── Layer rules ───────────────────────────────────────────────────────────────
layerrule=noanim:1,layer_name:^dms
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi

# ── DMS integration files (auto-managed by DMS) ───────────────────────────────
source=~/.config/mango/dms/colors.conf
source=~/.config/mango/dms/border-patch.conf
source=~/.config/mango/dms/layout.conf
source=~/.config/mango/dms/cursor.conf
source=~/.config/mango/dms/outputs.conf

# ── Keybindings ───────────────────────────────────────────────────────────────
source=~/.config/mango/binds.conf
